min_version = "2024.9.5"

[tools]
act = "latest"
actionlint = "latest"
prek = "latest"
python = { version = "3.14.6", virtualenv = ".venv" }
ty = "latest"
uv = "0.11.28"
zizmor = "latest"

[settings]
python.uv_venv_auto = "create|source"

[env]
DYLD_LIBRARY_PATH = "/opt/homebrew/opt/libpq/lib"
_.path = "/opt/homebrew/opt/libpq/bin"
_.python.venv = { path = ".venv", create = true }

[tasks.install]
description = "Install project dependencies with uv"
run = "uv sync"

[tasks.lint]
description = "Run formatting, linting, and type checks"
run = '''
uv run ruff format --check .
uv run ruff check .
uv run ty check
actionlint
zizmor --fix=safe .github/workflows/*
yaml_files=$(git ls-files --cached --others --exclude-standard '*.yaml' '*.yml')
if [ -n "$yaml_files" ]; then
  printf '%s\n' "$yaml_files" | xargs uvx yamllint
fi
'''

[tasks.test]
description = "Run the test suite"
run = '''
uv run pytest -m 'not integration' --ignore=tests/ingestion
mise run test:ingestion:unit
'''

[tasks."test:ingestion:unit"]
description = "Run Phase 3 ingestion tests that do not require Postgres"
run = "uv run pytest -m 'not integration' tests/ingestion"

[tasks."test:ingestion"]
description = "Run the full Phase 3 ingestion regression suite, including migrated Postgres flows"
run = '''
uv run pytest -m 'not integration' tests/ingestion
uv run pytest -m integration tests/ingestion
'''

[tasks.ci]
description = "Run the complete local validation path"
run = '''
#!/usr/bin/env sh
set -eu

postgres_started=0

cleanup() {
  status=$?
  trap - EXIT INT TERM
  set +e

  if [ "$postgres_started" -eq 1 ]; then
    mise run down
    down_status=$?
    if [ "$status" -eq 0 ]; then
      exit "$down_status"
    fi
  fi

  exit "$status"
}

trap cleanup EXIT INT TERM

mise run install
mise run lint
mise run test
postgres_started=1
mise run up
mise run db:migrate
mise run db:check
mise run test:ingestion
mise run test:integration
'''

[tasks.up]
description = "Start the local runtime"
run = "docker compose up --build --wait --wait-timeout 120 postgres"

[tasks.down]
description = "Stop the local runtime"
run = "docker compose down"

[tasks."db:migrate"]
description = "Apply database migrations"
run = "uv run alembic upgrade head"

[tasks."db:current"]
description = "Print the current database migration revision"
run = "uv run alembic current"

[tasks."db:history"]
description = "Show database migration history"
run = "uv run alembic history"

[tasks."db:check"]
description = "Validate required extensions and Phase 2 tables"
run = "uv run idp-brain db check"

[tasks."test:integration"]
description = "Run database-backed integration tests"
run = '''
uv run pytest -m integration \
  tests/integration \
  tests/test_migration_upgrade.py \
  tests/test_schema_safety_contracts.py \
  tests/db/test_embedding_migration.py \
  tests/db/test_paradedb_bm25_migration.py \
  tests/db/test_pgvector_hnsw_migration.py \
  tests/db/test_exact_lookup_indexes.py \
  tests/retrieval/test_bm25_retrieval.py \
  tests/retrieval/test_bm25_extension_smoke.py \
  tests/retrieval/test_vector_extension_smoke.py
'''

[tasks."db:reset"]
description = "Reset the disposable local Docker Compose database"
run = '''
#!/usr/bin/env sh
set -eu

uv run idp-brain db assert-local-reset-target
docker compose down --volumes --remove-orphans
docker compose up --build --wait --wait-timeout 120 postgres
uv run alembic upgrade head
uv run idp-brain db check
'''

[tasks.ingest]
description = "Run safe validation-only ingestion"
run = '''
#!/usr/bin/env sh
set -eu
postgres_started=0
cleanup() {
  status=$?
  trap - EXIT INT TERM
  if [ "$postgres_started" -eq 1 ]; then
    mise run down || true
  fi
  exit "$status"
}
trap cleanup EXIT INT TERM
if [ -z "$(docker compose ps --status running -q postgres)" ]; then
  postgres_started=1
  echo 'Starting local PostgreSQL for validation-only ingestion (110s timeout)...'
  if ! timeout 110s docker compose up --build --wait --wait-timeout 100 postgres; then
    echo 'Local PostgreSQL startup timed out or failed.' >&2
    exit 1
  fi
fi
echo 'Applying database migrations...'
mise run db:migrate
echo 'Recording validation-only dry-run ingestion...'
uv run idp-brain ingest run --validation-only --dry-run
'''

[tasks.retrieve]
description = "Run retrieval"
raw_args = true
run = '''
#!/usr/bin/env sh
echo 'Task retrieve is implemented in Phase 5.' >&2
exit 1
'''

[tasks.eval]
description = "Run retrieval evaluation"
run = '''
#!/usr/bin/env sh
echo 'Task eval is implemented in Phase 5.' >&2
exit 1
'''
