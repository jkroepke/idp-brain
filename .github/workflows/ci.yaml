---
name: CI

"on":
  pull_request:
  push:
    branches:
      - main

env:
  IDP_BRAIN_EXTERNAL_MODEL_CALLS_ENABLED: "false"
  IDP_BRAIN_EMBEDDING_PROVIDER: "mock"
  IDP_BRAIN_DATABASE_URL: >-
    postgresql+psycopg://idp_brain:idp_brain@localhost:55432/idp_brain

permissions:
  contents: read

jobs:
  ci:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install mise tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Install dependencies
        run: mise run install

      - name: Run validation
        run: |
          status=0
          mise run ci > /tmp/mise-ci.log 2>&1 || status=$?
          tail -n 120 /tmp/mise-ci.log
          exit "$status"

      - name: Stop local runtime
        if: always()
        run: mise run down
