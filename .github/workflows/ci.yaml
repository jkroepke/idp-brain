name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  IDP_BRAIN_EXTERNAL_MODEL_CALLS_ENABLED: "false"
  IDP_BRAIN_EMBEDDING_PROVIDER: "mock"
  IDP_BRAIN_DATABASE_URL: "postgresql+psycopg://idp_brain:idp_brain@localhost:55432/idp_brain"

permissions:
  contents: read

jobs:
  ci:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install mise tools
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: mise run install

      - name: Run validation
        run: mise run ci

      - name: Stop local runtime
        if: always()
        run: mise run down
