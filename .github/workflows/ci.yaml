---
name: CI

"on":
  pull_request:
  push:
    branches:
      - main

env:
  IDP_BRAIN_EXTERNAL_MODEL_CALLS_ENABLED: "false"
  IDP_BRAIN_EMBEDDING_PROVIDER: "mock"
  IDP_BRAIN_DATABASE_URL: >-
    postgresql+psycopg://idp_brain:idp_brain@localhost:55432/idp_brain

permissions:
  contents: read

jobs:
  ci:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install mise tools
        uses: jdx/mise-action@f10502fc09dadecfefb962fff68ce77213930204 # v4.2.2

      - name: Install dependencies
        run: mise run install

      - name: Run validation
        run: mise run ci

      - name: Stop local runtime
        if: always()
        run: mise run down
