---
# Local-only runtime for idp-brain development.
#
# ParadeDB publishes PostgreSQL-version-specific images that include pg_search.
# This MVP uses a pinned PostgreSQL 18 tag instead of pgvector/pgvector:pg18 so
# the local image path is explicitly intended to provide ParadeDB pg_search.
# Extension creation remains migration-managed in Phase 1.6.
services:
  postgres:
    image: paradedb/paradedb:v0.24.1-pg18
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-idp_brain}
      POSTGRES_USER: ${POSTGRES_USER:-idp_brain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-idp_brain}
    ports:
      - "127.0.0.1:${IDP_BRAIN_POSTGRES_PORT:-55432}:5432"
    volumes:
      - idp_brain_postgres18_cluster:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  idp_brain_postgres18_cluster:
    labels:
      idp-brain.scope: "local-development"
      idp-brain.disposable: "true"
