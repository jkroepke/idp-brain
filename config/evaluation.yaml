---
config_version: 1
kind: evaluation
mode: diagnostic
fixtures:
  - fixture_id: docs_qa_smoke
    path: tests/fixtures/evaluation/docs_qa.yaml
    enabled: true
  - fixture_id: code_qa_smoke
    path: tests/fixtures/evaluation/code_qa.yaml
    enabled: true
  - fixture_id: api_symbol_lookup_smoke
    path: tests/fixtures/evaluation/api_symbol_lookup.yaml
    enabled: true
thresholds:
  - metric_id: recall_at_5
    minimum: 0.0
    release_blocking: false
  - metric_id: mrr_at_10
    minimum: 0.0
    release_blocking: false
  - metric_id: citation_coverage
    minimum: 0.0
    release_blocking: false
embedding_fine_tuning:
  enabled: false
  candidate_models:
    - local-ci-embedding
    - local-ci-code-embedding
  training_dataset: null
