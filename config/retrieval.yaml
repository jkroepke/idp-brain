---
config_version: 1
kind: retrieval
query_profiles:
  - profile_id: docs_qa
    exact_fields:
      - source_id
      - version_label
      - artifact_path
      - heading_path
      - citation_id
    bm25_fields:
      - sanitized_text
      - heading_path
      - artifact_path
      - version_label
      - source_type
    vector_index: docs_chunks_hnsw
    embedding_profile_id: local-ci-embedding
    candidate_counts:
      exact_top_k: 10
      bm25_top_k: 80
      vector_top_k: 80
      fused_top_k: 60
      rerank_top_k: 12
    fusion_method: reciprocal_rank_fusion
    fusion_weights:
      exact: 1.0
      bm25: 1.0
      vector: 1.0
      relationship: 0.0
    reranker_profile_id: local-ci-reranker
    relationship_traversal:
      enabled: false
      relationship_types: []
      max_depth: 0
      max_fanout_per_seed: 0
      max_relationship_candidates: 0
      direction: outbound
      cycle_handling: skip_seen
      seed_sources: []
    filter_dimensions:
      - source_allowlist
      - visibility
      - sensitivity_class
      - license_policy_status
      - version_or_release_scope
      - active_index_version
    active_index_behavior:
      mode: require_active
      require_filter: true
    diagnostics:
      enabled: true
      include_candidate_counts: true
      include_profile: true
      include_filter_summary: true
      include_relationship_traversal: false
      include_scores: false
    freshness_weighting:
      enabled: true
      weight: 0.25
      strategy: release_or_snapshot_decay
    authority_weighting:
      enabled: true
      weight: 0.75
      strategy: source_priority
    token_budget: 1600

  - profile_id: code_qa
    exact_fields:
      - source_id
      - version_label
      - artifact_path
      - language
      - symbol_path
      - signature_text
      - import_path
    bm25_fields:
      - sanitized_text
      - symbol_path
      - signature_text
      - artifact_path
      - language
    vector_index: code_chunks_hnsw
    embedding_profile_id: local-ci-code-embedding
    candidate_counts:
      exact_top_k: 20
      bm25_top_k: 80
      vector_top_k: 80
      fused_top_k: 70
      rerank_top_k: 15
    fusion_method: reciprocal_rank_fusion
    fusion_weights:
      exact: 1.0
      bm25: 0.9
      vector: 0.8
      relationship: 0.4
    reranker_profile_id: local-ci-reranker
    relationship_traversal:
      enabled: true
      relationship_types:
        - depends_on
        - impacts
        - references
      max_depth: 1
      max_fanout_per_seed: 8
      max_relationship_candidates: 30
      direction: both
      cycle_handling: skip_seen
      seed_sources:
        - exact
        - fused
    filter_dimensions:
      - source_allowlist
      - visibility
      - sensitivity_class
      - license_policy_status
      - version_or_release_scope
      - active_index_version
    active_index_behavior:
      mode: require_active
      require_filter: true
    diagnostics:
      enabled: true
      include_candidate_counts: true
      include_profile: true
      include_filter_summary: true
      include_relationship_traversal: true
      include_scores: false
    freshness_weighting:
      enabled: true
      weight: 0.35
      strategy: commit_or_snapshot_decay
    authority_weighting:
      enabled: true
      weight: 0.85
      strategy: source_priority
    token_budget: 1800

  - profile_id: api_symbol_lookup
    exact_fields:
      - source_id
      - version_label
      - artifact_path
      - symbol_path
      - schema_path
      - schema_key
      - endpoint_path
      - field_name
      - flag_name
      - method_name
      - function_name
      - error_string
      - signature_text
    bm25_fields:
      - symbol_path
      - signature_text
      - artifact_path
      - sanitized_text
    vector_index: api_specs_hnsw
    embedding_profile_id: local-ci-code-embedding
    candidate_counts:
      exact_top_k: 30
      bm25_top_k: 60
      vector_top_k: 60
      fused_top_k: 50
      rerank_top_k: 10
    fusion_method: reciprocal_rank_fusion
    fusion_weights:
      exact: 1.0
      bm25: 0.8
      vector: 0.6
      relationship: 0.3
    reranker_profile_id: local-ci-reranker
    relationship_traversal:
      enabled: true
      relationship_types:
        - defines
        - references
        - impacts
      max_depth: 1
      max_fanout_per_seed: 6
      max_relationship_candidates: 20
      direction: both
      cycle_handling: skip_seen
      seed_sources:
        - exact
        - bm25
    filter_dimensions:
      - source_allowlist
      - visibility
      - sensitivity_class
      - license_policy_status
      - version_or_release_scope
      - active_index_version
    active_index_behavior:
      mode: require_active
      require_filter: true
    diagnostics:
      enabled: true
      include_candidate_counts: true
      include_profile: true
      include_filter_summary: true
      include_relationship_traversal: true
      include_scores: false
    freshness_weighting:
      enabled: true
      weight: 0.3
      strategy: version_label_precedence
    authority_weighting:
      enabled: true
      weight: 1.0
      strategy: formal_api_before_docs
    token_budget: 1200

  - profile_id: release_change_search
    exact_fields:
      - source_id
      - version_label
      - tracked_ref
      - release_tag
      - commit_sha
      - artifact_path
      - first_seen_version
      - last_seen_version
    bm25_fields:
      - sanitized_text
      - heading_path
      - artifact_path
      - version_label
      - commit_sha
    vector_index: release_notes_hnsw
    embedding_profile_id: local-ci-embedding
    candidate_counts:
      exact_top_k: 15
      bm25_top_k: 80
      vector_top_k: 60
      fused_top_k: 60
      rerank_top_k: 12
    fusion_method: reciprocal_rank_fusion
    fusion_weights:
      exact: 1.0
      bm25: 1.0
      vector: 0.8
      relationship: 0.5
    reranker_profile_id: local-ci-reranker
    relationship_traversal:
      enabled: true
      relationship_types:
        - version_lineage
        - introduced_in
        - removed_in
        - changed_by
        - derived_from
      max_depth: 2
      max_fanout_per_seed: 6
      max_relationship_candidates: 40
      direction: both
      cycle_handling: skip_seen
      seed_sources:
        - exact
        - fused
    filter_dimensions:
      - source_allowlist
      - visibility
      - sensitivity_class
      - license_policy_status
      - version_or_release_scope
      - active_index_version
    active_index_behavior:
      mode: require_active
      require_filter: true
    diagnostics:
      enabled: true
      include_candidate_counts: true
      include_profile: true
      include_filter_summary: true
      include_relationship_traversal: true
      include_scores: false
    freshness_weighting:
      enabled: true
      weight: 0.6
      strategy: newest_relevant_version
    authority_weighting:
      enabled: true
      weight: 0.7
      strategy: release_notes_then_code
    token_budget: 1800

  - profile_id: conflict_search
    exact_fields:
      - source_id
      - claim_subject
      - claim_predicate
      - version_label
      - citation_id
    bm25_fields:
      - sanitized_text
      - artifact_path
      - version_label
    vector_index: conflict_claims_hnsw
    embedding_profile_id: local-ci-embedding
    candidate_counts:
      exact_top_k: 20
      bm25_top_k: 80
      vector_top_k: 80
      fused_top_k: 70
      rerank_top_k: 20
    fusion_method: reciprocal_rank_fusion
    fusion_weights:
      exact: 1.0
      bm25: 0.9
      vector: 0.9
      relationship: 0.8
    reranker_profile_id: local-ci-reranker
    relationship_traversal:
      enabled: true
      relationship_types:
        - claim_conflicts
        - conflicts_with
      max_depth: 1
      max_fanout_per_seed: 10
      max_relationship_candidates: 40
      direction: both
      cycle_handling: skip_seen
      seed_sources:
        - exact
        - bm25
        - vector
        - fused
    filter_dimensions:
      - source_allowlist
      - visibility
      - sensitivity_class
      - license_policy_status
      - version_or_release_scope
      - active_index_version
    active_index_behavior:
      mode: require_active
      require_filter: true
    diagnostics:
      enabled: true
      include_candidate_counts: true
      include_profile: true
      include_filter_summary: true
      include_relationship_traversal: true
      include_scores: false
    freshness_weighting:
      enabled: true
      weight: 0.2
      strategy: keep_competing_versions
    authority_weighting:
      enabled: true
      weight: 1.0
      strategy: compare_source_priority
    token_budget: 2200
