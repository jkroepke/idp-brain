---
config_version: 1
kind: access
visibility_labels:
  - label: public
    description: Safe documentation that can be used in local examples.
    rank: 0
  - label: internal
    description: Repository-local material for authenticated project users.
    rank: 10
  - label: restricted
    description: Material requiring an explicit allow policy.
    rank: 20
sensitivity_labels:
  - label: public
    description: No sensitive content expected.
    rank: 0
  - label: internal
    description: Routine internal implementation details.
    rank: 10
  - label: confidential
    description: Sensitive material requiring scoped access.
    rank: 20
  - label: restricted
    description: Highly restricted material excluded by default.
    rank: 30
license_policy_labels:
  - label: allowed
    description: Allowed for indexing and retrieval.
    rank: 0
  - label: review_required
    description: Requires operator review before broad use.
    rank: 10
  - label: restricted
    description: Excluded unless an explicit policy allows use.
    rank: 20
  - label: unknown
    description: Treated as denied until classified.
    rank: 30
acl_policies:
  - policy_id: public-local-docs
    visibility_label: public
    allowed_groups:
      - developers
      - ci
    allowed_principals:
      - service:ci
    source_ids:
      - local-docs
    source_filters:
      visibility_label: public
    chunk_filters:
      sensitivity_class: public
    default_deny: true

  - policy_id: internal-local-sources
    visibility_label: internal
    allowed_groups:
      - developers
      - ci
    allowed_principals:
      - service:ci
    source_ids:
      - local-source-tree
      - local-config-examples
      - local-openapi-example
      - local-schema-example
      - local-repository-digest-example
    source_filters:
      visibility_label: internal
    chunk_filters:
      sensitivity_class: internal
    default_deny: true

  - policy_id: restricted-rich-docs
    visibility_label: restricted
    allowed_groups:
      - docs-admins
    allowed_principals: []
    source_ids:
      - local-rich-docs-example
    source_filters:
      visibility_label: restricted
    chunk_filters:
      sensitivity_class: confidential
    default_deny: true
default_deny: true
unknown_label_policy: deny
