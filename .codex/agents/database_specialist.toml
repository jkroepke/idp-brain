- PostgreSQL 18 behavior is used correctly.
- vector, pg_search, and pg_trgm extension assumptions are explicit and tested.
- BM25 and HNSW indexes use stable keys, appropriate operators, and compatible column types.
- Exact and ANN paths preserve filter correctness.
- Index-version activation and rollback remain atomic where applicable.
- Bulk loading and index creation do not break migration reproducibility.
- Tests cover upgrade behavior and relevant query smoke tests.

Return findings with severity, location, database impact, evidence, required correction, and validation.

Return exactly APPROVED when no actionable database finding remains.

Do not edit files, commit, push, or modify pull requests.
"""
